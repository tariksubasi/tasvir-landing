<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

    <!-- Open Graph -->

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta

      content="An agentic AI tool that turns a single prompt into a long-form, readable, printable, and shareable document."

    <meta name="twitter:image" content="https://i.ytimg.com/vi/tZgCnnuzCYA/maxresdefault.jpg" />

    <link rel="icon" type="image/svg+xml" href="./icon.svg" />

    <link
      rel="preconnect"
      href="https://www.youtube-nocookie.com"
    />
    <link rel="preconnect" href="https://i.ytimg.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />

    <!-- Structured data: helps video rich results in search -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoObject",
        "name": "Tasvir — One prompt into a complete document",
        "description": "Tasvir is an agentic AI tool that turns a single prompt into a long-form, readable, printable, and shareable document.",
        "thumbnailUrl": "https://i.ytimg.com/vi/tZgCnnuzCYA/maxresdefault.jpg",
        "uploadDate": "2026-07-12",
        "contentUrl": "https://www.youtube.com/watch?v=tZgCnnuzCYA",
        "embedUrl": "https://www.youtube-nocookie.com/embed/tZgCnnuzCYA",
        "publisher": {
          "@type": "Organization",
          "name": "Tasvir",
          "url": "https://tasvir.ai/"
        }
      }
    </script>
  </head>

  <body class="min-h-screen bg-[#0b0b12] font-sans text-slate-100 antialiased">
    <div class="flex min-h-screen flex-col">
      <!-- Header -->
      <header class="w-full border-b border-white/5">
        <nav
          class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-4 sm:px-6"
        >
          <a href="/" class="flex items-center gap-2" aria-label="Tasvir home">
            <img
              src="./icon.svg"
              alt="Tasvir logo"
              width="32"
              height="32"
              class="h-8 w-8 rounded-lg"
            />
            <span class="text-lg font-bold tracking-tight">Tasvir</span>
          </a>

          <div class="flex items-center gap-2 sm:gap-3">
            <!-- Language toggle -->
            <div
              class="flex items-center rounded-full border border-white/10 p-0.5 text-sm font-medium"
              role="group"
              aria-label="Language"
            >
              <button
                type="button"
                data-lang-btn="en"
                class="rounded-full px-3 py-1.5 transition hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-brand"
              >
                EN
              </button>
              <button
                type="button"
                data-lang-btn="tr"
                class="rounded-full px-3 py-1.5 transition hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-brand"
              >
                TR
              </button>
            </div>

            <a
              href="https://app.tasvir.ai/signin"
              class="hidden rounded-full px-4 py-2 text-sm font-medium text-slate-200 transition hover:bg-white/5 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-brand sm:inline-flex"
              data-i18n="signIn"
              >Sign in</a
            >
            <a
              href="https://app.tasvir.ai/signup"
              class="inline-flex items-center rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-brand-dark focus:outline-none focus-visible:ring-2 focus-visible:ring-brand"
              data-i18n="signUp"
              >Sign up</a
            >
          </div>
        </nav>
      </header>

      <!-- Main -->
      <main
        class="mx-auto flex w-full max-w-4xl flex-1 flex-col items-center justify-center gap-8 px-4 py-12 text-center sm:px-6 sm:py-16"
      >
        <div class="flex flex-col items-center gap-4">
          <h1
            class="text-3xl font-extrabold leading-tight tracking-tight sm:text-5xl"
            data-i18n="heroTitle"
          >
            One prompt. A complete document.
          </h1>
          <p
            class="max-w-2xl text-base text-slate-300 sm:text-lg"
            data-i18n="heroSubtitle"
          >
            Tasvir is an agentic AI tool that turns a single prompt into a
            long-form, readable, printable, and shareable document.
          </p>
        </div>

        <!-- Centered YouTube video -->
        <div class="w-full">
          <div
            class="relative mx-auto aspect-video w-full overflow-hidden rounded-2xl border border-white/10 bg-black shadow-2xl shadow-black/50"
          >
            <iframe
              class="absolute inset-0 h-full w-full"
              src="https://www.youtube-nocookie.com/embed/tZgCnnuzCYA?rel=0"
              title="Tasvir demo video"
              loading="lazy"
              referrerpolicy="strict-origin-when-cross-origin"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </div>
        </div>

        <!-- Primary CTA -->
        <div class="flex flex-col items-center gap-3">
          <a
            href="https://app.tasvir.ai/signup"
            class="inline-flex items-center justify-center rounded-full bg-brand px-8 py-3.5 text-base font-semibold text-white transition hover:bg-brand-dark focus:outline-none focus-visible:ring-2 focus-visible:ring-brand focus-visible:ring-offset-2 focus-visible:ring-offset-[#0b0b12]"
            data-i18n="cta"
          >
            Try Tasvir free
          </a>
          <p class="text-sm text-slate-400" data-i18n="tagline">
            Generate. Read. Learn. Share. Print.
          </p>
        </div>
      </main>

      <!-- Footer -->
      <footer class="w-full border-t border-white/5">
        <div
          class="mx-auto flex max-w-6xl flex-col items-center justify-between gap-3 px-4 py-6 text-sm text-slate-400 sm:flex-row sm:px-6"
        >
          <p>&copy; <span id="year">2026</span> Tasvir</p>
          <div class="flex flex-wrap items-center justify-center gap-x-5 gap-y-2">
            <a
              href="https://app.tasvir.ai/privacy"
              class="transition hover:text-white"
              data-i18n="privacy"
              >Privacy Policy</a
            >
            <a
              href="https://app.tasvir.ai/terms"
              class="transition hover:text-white"
              data-i18n="terms"
              >Terms of Use</a
            >
            <a
              href="https://app.tasvir.ai/main?legal=kvkk"
              class="transition hover:text-white"
              data-i18n="kvkk"
              >KVKK Notice</a
            >
          </div>
        </div>
      </footer>
    </div>

    <script>
      (function () {
        var translations = {
          en: {
            htmlLang: "en",
            title:
              "Tasvir — Turn one prompt into a complete, printable document",
            description:
              "Tasvir is an agentic AI tool that turns a single prompt into a long-form, readable, printable, and shareable document.",
            signIn: "Sign in",
            signUp: "Sign up",
            heroTitle: "One prompt. A complete document.",
            heroSubtitle:
              "Tasvir is an agentic AI tool that turns a single prompt into a long-form, readable, printable, and shareable document.",
            cta: "Try Tasvir free",
            tagline: "Generate. Read. Learn. Share. Print.",
            privacy: "Privacy Policy",
            terms: "Terms of Use",
            kvkk: "KVKK Notice",
          },
          tr: {
            htmlLang: "tr",
            title:
              "Tasvir — Tek bir istemi eksiksiz, yazdirilabilir bir belgeye donusturun",
            description:
              "Tasvir, tek bir istemi uzun, okunabilir, yazdirilabilir ve paylasilabilir bir belgeye donusturen agentic bir yapay zeka aracidir.",
            signIn: "Giris yap",
            signUp: "Kayit ol",
            heroTitle: "Tek bir istem. Eksiksiz bir belge.",
            heroSubtitle:
              "Tasvir, tek bir istemi uzun, okunabilir, yazdirilabilir ve paylasilabilir bir belgeye donusturen agentic bir yapay zeka aracidir.",
            cta: "Tasvir'i ucretsiz dene",
            tagline: "Uret. Oku. Ogren. Paylas. Yazdir.",
            privacy: "Gizlilik Politikasi",
            terms: "Kullanim Sartlari",
            kvkk: "KVKK Aydinlatma Metni",
          },
        };

        var STORAGE_KEY = "tasvir_lang";
        var buttons = document.querySelectorAll("[data-lang-btn]");
        var activeClasses = ["bg-white/10", "text-white"];

        function applyLang(lang) {
          var dict = translations[lang] || translations.en;

          document.documentElement.lang = dict.htmlLang;
          document.title = dict.title;
          var metaDesc = document.querySelector('meta[name="description"]');
          if (metaDesc) metaDesc.setAttribute("content", dict.description);

          document.querySelectorAll("[data-i18n]").forEach(function (el) {
            var key = el.getAttribute("data-i18n");
            if (dict[key]) el.textContent = dict[key];
          });

          buttons.forEach(function (btn) {
            var isActive = btn.getAttribute("data-lang-btn") === lang;
            activeClasses.forEach(function (cls) {
              btn.classList.toggle(cls, isActive);
            });
            btn.setAttribute("aria-pressed", isActive ? "true" : "false");
          });

          try {
            localStorage.setItem(STORAGE_KEY, lang);
          } catch (e) {}
        }

        function detectInitialLang() {
          try {
            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved === "en" || saved === "tr") return saved;
          } catch (e) {}
          var nav = (navigator.language || "en").toLowerCase();
          return nav.indexOf("tr") === 0 ? "tr" : "en";
        }

        buttons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            applyLang(btn.getAttribute("data-lang-btn"));
          });
        });

        var yearEl = document.getElementById("year");
        if (yearEl) yearEl.textContent = String(new Date().getFullYear());

        applyLang(detectInitialLang());
      })();
    </script>
  </body>
</html>
